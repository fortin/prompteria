# Build and release Promptastic as a DMG when a new tag is pushed.
# Usage: git tag v1.0.0 && git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'
        # Project uses Xcode 16 format; macos-14 defaults to Xcode 15.4

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git describe

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build and create DMG
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "${GITHUB_REF_NAME#v}"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Promptastic-*.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
