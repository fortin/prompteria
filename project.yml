name: Promptastic
options:
  bundleIdPrefix: com.promptastic
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Down:
    url: https://github.com/johnxnguyen/Down
    from: "0.11.0"

schemes:
  Promptastic:
    build:
      targets:
        Promptastic: all

targets:
  Promptastic:
    type: application
    platform: macOS
    sources:
      - path: Promptastic
        excludes:
          - "**/*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.promptastic.app
        INFOPLIST_FILE: Promptastic/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Promptastic/Promptastic.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        # Replace YOUR_TEAM_ID with your Apple Developer Team ID (10 chars)
        # Find it: Xcode → Settings → Accounts → Team ID
        DEVELOPMENT_TEAM: YOUR_TEAM_ID
    dependencies:
      - package: GRDB
      - package: Down
    entitlements:
      path: Promptastic/Promptastic.entitlements
