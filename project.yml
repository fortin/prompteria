name: Prompteria
options:
  bundleIdPrefix: com.prompteria
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.8.0"  # 7.9+ requires Swift 6.1; pin for CI (Xcode 16.2 has Swift 6.0)
  Down:
    url: https://github.com/johnxnguyen/Down
    from: "0.11.0"

schemes:
  Prompteria:
    build:
      targets:
        Prompteria: all

targets:
  Prompteria:
    type: application
    platform: macOS
    sources:
      - path: Prompteria
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prompteria.app
        INFOPLIST_FILE: Prompteria/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Prompteria/Prompteria.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        # General → Identity (persisted so "xcodegen generate" does not reset them)
        MARKETING_VERSION: "0.3.12-beta.1"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Prompteria
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        # Signing: replace with your Team ID (Xcode → Settings → Accounts)
        DEVELOPMENT_TEAM: M2FHQ674JJ
    dependencies:
      - package: GRDB
      - package: Down
    entitlements:
      path: Prompteria/Prompteria.entitlements
